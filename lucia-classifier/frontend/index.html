<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/roncore-logo-v7.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RonCore Analytics</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://127.0.0.1:8000;" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="apple-touch-icon" href="/roncore-logo-v7.png" />
    <script>
      // 🚀 SCRIPT DE LIMPEZA NUCLEAR (Força atualização em navegadores travados)
      async function clearAllCaches() {
        try {
          // 1. Desregistrar todos os Service Workers
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (let registration of registrations) {
              await registration.unregister();
              console.log('Service Worker desregistrado');
            }
          }
          // 2. Limpar todos os caches da API Cache
          if ('caches' in window) {
            const names = await caches.keys();
            for (let name of names) {
              await caches.delete(name);
              console.log('Cache limpo:', name);
            }
          }
          // 3. Limpar Storage Local (Opcional, mas ajuda a resetar estados zumbis)
          localStorage.clear();
          sessionStorage.clear();
          
          console.log('Limpeza completa realizada com sucesso.');
        } catch (err) {
          console.error('Erro na limpeza crítica:', err);
        }
      }

      // Executa a limpeza imediatamente se for necessário (detectado por URL ou versão)
      clearAllCaches();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
